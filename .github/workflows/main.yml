name: UAIDTIN-ALPHA-07_HEARTBEAT

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Aligning with 2026 Standards

jobs:
  scout_logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereign Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Logic Injection
        env:
          RENDER_ENDPOINT: ${{ secrets.RENDER_ENDPOINT }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: python harvester.py
