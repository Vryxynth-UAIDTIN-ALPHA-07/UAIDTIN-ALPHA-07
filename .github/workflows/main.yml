name: UAIDTIN-ALPHA-07_HEARTBEAT

on:
  schedule:
    - cron: '0 */6 * * *' # Executes every 6 hours
  workflow_dispatch: # Enables the "Run workflow" button for manual execution

jobs:
  scout_logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Logic Injection
        env:
          RENDER_ENDPOINT: ${{ secrets.RENDER_ENDPOINT }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: python harvester.py
